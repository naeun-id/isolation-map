<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>나은병원 격리환자 현황</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap');
:root{
  --bg:#05080e;--surf:#0b1120;--brd:#16233a;
  --acc:#00e5ff;--grn:#64ffda;
  --txt:#c8d8f0;--dim:#3a5070;--dim2:#243550;
  /* 항목 색상 */
  --c-tb:#ff6b35;    /* 호흡기결핵 - 주황 */
  --c-vre:#a855f7;   /* VRE - 보라 */
  --c-mrpa:#3b82f6;  /* MRPA - 파랑 */
  --c-mrsa:#f59e0b;  /* MRSA - 황금 */
  --c-cre:#ef4444;   /* CRE - 빨강 */
  --c-mrab:#10b981;  /* MRAB - 초록 */
  --c-cauris:#ec4899;/* C.auris - 핑크 */
  --c-cdiff:#84cc16; /* C.diff - 라임 */
  --c-cpo:#f97316;   /* CPO - 오렌지 */
  --c-etc:#94a3b8;   /* 기타 - 회색 */
  --c-blood:#dc2626; /* 혈액주의 - 진빨강 */
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--txt);font-family:'Noto Sans KR',sans-serif;}

#app{display:flex;height:100vh;}

/* ── 사이드바 ── */
#sb{width:260px;min-width:260px;display:flex;flex-direction:column;
  background:var(--surf);border-right:1px solid var(--brd);}
#sb-top{padding:14px 15px 10px;
  background:linear-gradient(150deg,#060d1c,#0a1a30);
  border-bottom:1px solid var(--brd);}
#sb-top h1{font-size:12.5px;font-weight:700;color:var(--acc);line-height:1.6;}

.date-nav{display:flex;align-items:center;gap:6px;margin-top:8px;}
.date-btn{background:rgba(0,229,255,.1);border:2px solid rgba(0,229,255,.6);
  color:var(--acc);border-radius:6px;padding:5px 13px;font-size:16px;
  cursor:pointer;transition:.14s;line-height:1;font-weight:900;}
.date-btn:hover:not(:disabled){border-color:var(--acc);background:rgba(0,229,255,.2);}
.date-btn:disabled{opacity:.2;cursor:default;}
#today-date{flex:1;text-align:center;font-size:14px;color:var(--acc);
  font-weight:700;letter-spacing:.01em;}
#sb-top .date{font-size:9px;color:var(--dim);margin-top:3px;
  font-family:'DM Mono',monospace;}

/* 층 탭 */
#ward-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:8px 10px;
  border-bottom:1px solid var(--brd);background:#080f1c;}
.wtab{padding:5px 8px;border:1px solid var(--brd);border-radius:4px;
  font-size:9.5px;font-weight:500;cursor:pointer;background:#060b16;
  color:var(--dim);transition:.14s;font-family:'DM Mono',monospace;}
.wtab:hover{border-color:var(--acc);color:var(--acc);}
.wtab.on{border-color:var(--acc);background:rgba(0,229,255,.1);color:var(--acc);}
.wtab.has{border-color:rgba(255,100,50,.4);color:#ff9966;}
.wtab.has.on{background:rgba(255,100,50,.08);}

/* 범례 */
#legend{padding:10px 10px 8px;border-bottom:1px solid var(--brd);overflow-y:auto;flex-shrink:0;}
#legend h3{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;
  letter-spacing:.08em;margin-bottom:6px;}
.leg-section{margin-bottom:8px;}
.leg-title{font-size:9px;color:var(--dim);margin-bottom:4px;}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.leg-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.leg-lbl{font-size:10px;color:var(--txt);}
.leg-code{font-size:9px;color:var(--dim);font-family:'DM Mono',monospace;margin-left:auto;}

/* 환자 목록 */
#pt-list{flex:1;overflow-y:auto;padding:8px 8px;
  scrollbar-width:thin;scrollbar-color:var(--brd) transparent;}
.pt-item{padding:6px 9px;border-radius:5px;margin-bottom:3px;
  border:1px solid var(--brd);background:#08111e;cursor:pointer;
  transition:.12s;display:flex;align-items:flex-start;gap:7px;}
.pt-item:hover{border-color:rgba(0,229,255,.25);background:rgba(0,229,255,.04);}
.pt-item.sel{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.07);}
.pt-icons{display:flex;flex-direction:column;gap:1px;flex-shrink:0;margin-top:1px;}
.pt-info{flex:1;min-width:0;}
.pt-room{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--acc);}
.pt-name{font-size:10px;color:var(--txt);margin-top:1px;}
.pt-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
.pt-tag{padding:1px 5px;border-radius:3px;font-size:8.5px;
  font-family:'DM Mono',monospace;font-weight:500;border:1px solid;}

/* ── 메인 도면 ── */
#main{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;}
#fp-area{flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#040710;cursor:grab;}
#fp-area:active{cursor:grabbing;}
#fp-cont{position:relative;display:inline-block;transform-origin:center;}
#fp-img{display:block;max-width:100%;max-height:100%;
  user-select:none;-webkit-user-drag:none;}
#fp-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* 마커 */
.rm{position:absolute;transform:translate(-50%,-50%);
  pointer-events:all;cursor:pointer;z-index:10;}

/* 아이콘 스택 컨테이너 */
.rm-stack{
  position:relative;
  width:22px;
  display:flex;flex-direction:column;align-items:center;
  gap:0px;
}
.rm-icon{
  width:20px;height:20px;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  border:1.5px solid rgba(255,255,255,.15);
  background:rgba(10,15,30,.85);
  backdrop-filter:blur(4px);
  box-shadow:0 1px 4px rgba(0,0,0,.5);
  transition:transform .12s;
  flex-shrink:0;
  /* 겹쳐쌓기: 이후 항목에 margin-top 음수 적용 */
}
.rm-icon-hl{
  border-radius:5px;
  animation:hl-pulse 2s ease-in-out infinite;
}
@keyframes hl-pulse{
  0%,100%{box-shadow:0 0 0 1px currentColor, 0 0 10px currentColor, 0 0 20px currentColor;}
  50%{box-shadow:0 0 0 2px currentColor, 0 0 16px currentColor, 0 0 30px currentColor;}
}
.rm-icon:not(:first-child){
  margin-top:-6px;
}
.rm:hover .rm-icon{transform:translateY(-2px);z-index:20;}
.rm:hover .rm-stack .rm-icon:not(:first-child){
  margin-top:1px; /* hover시 펼침 */
}
.rm-stack:hover .rm-icon:not(:first-child){
  margin-top:2px;
}

/* 마커 라벨 */
.rm-lbl{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-size:7.5px;font-family:'DM Mono',monospace;
  color:var(--acc);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .12s;
  background:rgba(5,8,14,.85);padding:1px 4px;border-radius:3px;
}
.rm:hover .rm-lbl{opacity:1;}

/* AMR 있는 마커는 항상 라벨 표시 */
.rm.has-amr .rm-lbl{opacity:1;color:#ff9966;}

/* 컨트롤 바 */
#ctrl-bar{padding:7px 14px;background:rgba(8,12,22,.95);
  border-top:1px solid var(--brd);display:flex;align-items:center;
  justify-content:space-between;backdrop-filter:blur(8px);}
.cb-l{display:flex;align-items:center;gap:10px;}
.cb-ward{font-size:12px;font-weight:600;color:var(--acc);}
.cb-cnt{font-size:11px;color:#ff9966;font-family:'DM Mono',monospace;}
.zbs{display:flex;gap:4px;}
.zb{width:27px;height:27px;border:1px solid var(--brd);background:rgba(8,12,22,.8);
  color:var(--txt);border-radius:5px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:.12s;}
.zb:hover{border-color:var(--acc);color:var(--acc);}

/* 통계 바 */
#stat-bar{
  display:flex;gap:4px;padding:6px 12px;
  background:#070e1c;border-top:1px solid var(--brd);
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.stat-chip{
  padding:3px 9px;border-radius:20px;font-size:9.5px;
  font-family:'DM Mono',monospace;font-weight:500;
  border:1px solid;white-space:nowrap;flex-shrink:0;
}

/* 툴팁 */
#tip{position:fixed;background:rgba(6,10,18,.97);
  border:1px solid var(--brd);border-radius:8px;
  padding:9px 12px;font-size:11px;pointer-events:none;
  display:none;z-index:9999;max-width:240px;line-height:1.7;
  backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.5);}
#tip .tp-room{font-family:'DM Mono',monospace;font-size:12px;
  font-weight:600;color:var(--acc);margin-bottom:5px;}
.tp-entry{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.tp-entry:last-child{margin-bottom:0;}
.tp-icon{font-size:14px;width:18px;text-align:center;}
.tp-info{font-size:10px;}
.tp-bug{font-family:'DM Mono',monospace;font-size:10px;}
.tp-name{font-size:9px;color:var(--dim);margin-top:1px;}
</style>
</head>

<div id="app">

<!-- 사이드바 -->
<div id="sb">
  <div id="sb-top">
    <h1>🏥 나은병원 격리환자 현황</h1>
    <div class="date-nav"><button class="date-btn" id="date-prev">◀</button><span id="today-date"></span><button class="date-btn" id="date-next">▶</button></div>
  </div>
  <div id="ward-tabs"></div>
  <div id="legend">
    <h3>LEGEND</h3>
    <div class="leg-section">
      <div class="leg-title">격리 종류</div>
      <div class="leg-row"><div class="leg-icon">🧤</div><div class="leg-lbl">접촉주의 (Contact)</div></div>
      <div class="leg-row"><div class="leg-icon">😷</div><div class="leg-lbl">공기주의 (Airborne)</div></div>
      <div class="leg-row"><div class="leg-icon">🩸</div><div class="leg-lbl">혈액주의 (Blood)</div></div>
    </div>
    <div class="leg-section">
      <div class="leg-title">내성균 색상</div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-tb)"></div><div class="leg-lbl">호흡기결핵</div><div class="leg-code">TB</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-vre);box-shadow:0 0 5px var(--c-vre);outline:1.5px solid var(--c-vre);outline-offset:1px"></div><div class="leg-lbl">VRE</div><div class="leg-code" style="color:var(--c-vre)">VRE ★</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-mrpa)"></div><div class="leg-lbl">MRPA</div><div class="leg-code">MRPA</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-mrsa)"></div><div class="leg-lbl">MRSA</div><div class="leg-code">MRSA</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-cre);box-shadow:0 0 5px var(--c-cre);outline:1.5px solid var(--c-cre);outline-offset:1px"></div><div class="leg-lbl">CRE</div><div class="leg-code" style="color:var(--c-cre)">CRE ★</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-mrab)"></div><div class="leg-lbl">MRAB</div><div class="leg-code">MRAB</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-cauris)"></div><div class="leg-lbl">C. auris</div><div class="leg-code">C.aur</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-cdiff)"></div><div class="leg-lbl">C. difficile</div><div class="leg-code">C.dif</div></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--c-cpo);box-shadow:0 0 5px var(--c-cpo);outline:1.5px solid var(--c-cpo);outline-offset:1px"></div><div class="leg-lbl">CPO</div><div class="leg-code" style="color:var(--c-cpo)">CPO ★</div></div>
      
    </div>
  </div>
  <div id="pt-list"></div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="fp-area">
    <div id="fp-cont">
      <img id="fp-img" src="" alt="도면" draggable="false">
      <div id="fp-overlay"></div>
    </div>
  </div>
  <div id="stat-bar"></div>
  <div id="ctrl-bar">
    <div class="cb-l">
      <span class="cb-ward" id="ward-name">—</span>
      <span class="cb-cnt" id="ward-cnt"></span>
    </div>
    <div class="zbs">
      <button class="zb" id="zi">+</button>
      <button class="zb" id="zo">−</button>
      <button class="zb" id="zr">⟳</button>
    </div>
  </div>
</div>
</div>

<div id="tip"></div>

// ══════════════════════════════════════════════
// 항목 → 표시 정보 매핑
// ══════════════════════════════════════════════
function getItemInfo(item, cat) {
  const c = item.toLowerCase();
  // 공기주의
  if (cat.includes('공기')) return { icon:'😷', color:'var(--c-tb)',  code:'TB',    label:'호흡기결핵', isAir:true };
  // 혈액주의
  if (cat.includes('혈액')) return { icon:'🩸', color:'var(--c-blood)',code:'BLOOD', label:'혈액주의', isBlood:true };
  // 접촉주의 세부
  if (c.includes('vre'))   return { icon:'🧤', color:'var(--c-vre)',   code:'VRE',   label:'VRE',   highlight:true };
  if (c.includes('mrpa') || c.includes('mrpa')) return { icon:'🧤', color:'var(--c-mrpa)',  code:'MRPA',  label:'MRPA' };
  if (c.includes('mrsa'))  return { icon:'🧤', color:'var(--c-mrsa)',  code:'MRSA',  label:'MRSA' };
  if (c.includes('cre') && !c.includes('c.')) return { icon:'🧤', color:'var(--c-cre)',   code:'CRE',   label:'CRE',   highlight:true };
  if (c.includes('mrab'))  return { icon:'🧤', color:'var(--c-mrab)',  code:'MRAB',  label:'MRAB' };
  if (c.includes('c.auris') || c.includes('auris')) return { icon:'🧤', color:'var(--c-cauris)', code:'C.aur', label:'C.auris' };
  if (c.includes('difficile') || c.includes('c.dif')) return { icon:'🧤', color:'var(--c-cdiff)', code:'C.dif', label:'C.diff' };
  if (c.includes('cpo'))   return { icon:'🧤', color:'var(--c-cpo)',   code:'CPO',   label:'CPO',   highlight:true };
  if (c.includes('결핵'))  return { icon:'😷', color:'var(--c-tb)',    code:'TB',    label:'결핵', isAir:true };
  // 기타
  return { icon:'🧤', color:'var(--c-etc)', code:'ETC', label: item.replace(/^\d+ : /,'') };
}

function renderWardTabs() {
  const el = document.getElementById('ward-tabs');
  el.innerHTML = WARD_ORDER.map(wid => {
    const wCnt = Object.entries(getCurData())
      .filter(([k]) => k.startsWith(wid+'/'))
      .reduce((s,[,v]) => s + v.length, 0);
    return `<button class="wtab ${wid===curWard?'on':''} ${wCnt>0?'has':''}" data-w="${wid}">
      ${wid}${wCnt>0?`<span style="font-size:8px;margin-left:2px;color:inherit">${wCnt}</span>`:''}
    </button>`;
  }).join('');
  el.querySelectorAll('.wtab').forEach(b => b.addEventListener('click', () => {
    curWard = b.dataset.w; selRoom = null; pan={scale:1,x:0,y:0}; applyPan(); render();
  }));
}

// ══════════════════════════════════════════════
// 환자 목록 사이드바
// ══════════════════════════════════════════════
function renderPtList() {
  const el = document.getElementById('pt-list');
  // 현재 병동 병실만
  const wardRooms = Object.entries(getCurData())
    .filter(([k]) => k.startsWith(curWard+'/'))
    .sort(([a],[b]) => a.localeCompare(b));

  if (!wardRooms.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--dim);font-size:11px;">이 병동에 격리 환자가<br>없습니다.</div>';
    return;
  }

  el.innerHTML = wardRooms.map(([key, entries]) => {
    const room = key.split('/')[1];
    // 중복 제거 (항목 기준 unique)
    const uniqueEntries = [];
    const seen = new Set();
    for (const e of entries) {
      const uk = e.item + '|' + e.cat;
      if (!seen.has(uk)) { seen.add(uk); uniqueEntries.push(e); }
    }
    const icons = uniqueEntries.map(e => {
      const info = getItemInfo(e.item, e.cat);
      return `<span style="font-size:12px;filter:drop-shadow(0 0 3px ${info.color})">${info.icon}</span>`;
    }).join('');
    const tags = uniqueEntries.map(e => {
      const info = getItemInfo(e.item, e.cat);
      return `<span class="pt-tag" style="color:${info.color};border-color:${info.color}33;background:${info.color}15">${info.code}</span>`;
    }).join('');
    // 환자명 목록
    const names = [...new Set(entries.map(e=>e.name))].join(', ');
    const sel = selRoom === room;
    return `<div class="pt-item ${sel?'sel':''}" data-r="${room}">
      <div class="pt-icons">${icons}</div>
      <div class="pt-info">
        <div class="pt-room">${room}호</div>
        <div class="pt-name">${names}</div>
        <div class="pt-tags">${tags}</div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.pt-item').forEach(el => el.addEventListener('click', () => {
    selRoom = el.dataset.r;
    render();
    // 해당 마커로 스크롤
    const rm = document.querySelector(`.rm[data-r="${selRoom}"]`);
    if (rm) rm.scrollIntoView?.();
  }));
}

// ══════════════════════════════════════════════
// 통계 바
// ══════════════════════════════════════════════
function renderStatBar() {
  const el = document.getElementById('stat-bar');
  // 현재 병동 항목별 집계
  const counts = {};
  Object.entries(getCurData())
    .filter(([k]) => k.startsWith(curWard+'/'))
    .forEach(([,entries]) => {
      const seen = new Set();
      entries.forEach(e => {
        const uk = e.item+'|'+e.cat;
        if (seen.has(uk)) return;
        seen.add(uk);
        const info = getItemInfo(e.item, e.cat);
        counts[info.code] = (counts[info.code]||{code:info.code,color:info.color,icon:info.icon,n:0});
        counts[info.code].n++;
      });
    });
  
  const total = Object.values(counts).reduce((s,v)=>s+v.n,0);
  if (!total) { el.innerHTML = '<span style="font-size:10px;color:var(--dim);padding:0 4px">이 병동 격리 환자 없음</span>'; return; }

  el.innerHTML = `<span style="font-size:9px;color:var(--dim);margin-right:4px;white-space:nowrap">총 ${total}건</span>` +
    Object.values(counts).map(v =>
      `<span class="stat-chip" style="color:${v.color};border-color:${v.color}44;background:${v.color}12">
        ${v.icon} ${v.code} <b>${v.n}</b>
      </span>`).join('');
}

function renderFloorplan() {
  const w = WARDS[curWard];
  document.getElementById('ward-name').textContent = w.label;
  const totalPts = Object.entries(getCurData())
    .filter(([k])=>k.startsWith(curWard+'/'))
    .reduce((s,[,v])=>s+[...new Set(v.map(e=>e.pid))].length, 0);
  document.getElementById('ward-cnt').textContent =
    totalPts ? `격리 ${totalPts}명` : '';

  const img = document.getElementById('fp-img');
  const overlay = document.getElementById('fp-overlay');
  const newSrc = IMGS[w.imgKey];
  if (img.src !== newSrc) img.src = newSrc;
  img.onload = () => placeMarkers(w, img, overlay);
  if (img.complete && img.naturalWidth) placeMarkers(w, img, overlay);
}

function placeMarkers(w, img, overlay) {
  overlay.innerHTML = '';
  const iw = img.offsetWidth, ih = img.offsetHeight;
  const sw = iw / w.imgW, sh = ih / w.imgH;

  Object.entries(w.rooms).forEach(([num]) => {
    const r = w.rooms[num];
    const key = `${curWard}/${num}`;
    const entries = getCurData()[key] || [];

    // 중복 제거 (항목 기준)
    const uniq = [];
    const seen = new Set();
    entries.forEach(e => {
      const uk = e.item+'|'+e.cat;
      if (!seen.has(uk)) { seen.add(uk); uniq.push(e); }
    });

    const hasPatients = uniq.length > 0;
    const sel = selRoom === num;

    const div = document.createElement('div');
    div.className = `rm ${hasPatients?'has-amr':''} ${sel?'sel':''}`;
    div.dataset.r = num;
    div.style.left = (r.px * sw) + 'px';
    div.style.top  = (r.py * sh) + 'px';

    if (!hasPatients) {
      // 빈 병실: 작은 점
      div.innerHTML = `
        <div style="width:7px;height:7px;border-radius:50%;
          background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.25);"></div>
        <div class="rm-lbl">${num}</div>`;
    } else {
      // 아이콘 스택
      const stackItems = uniq.map((e, i) => {
        const info = getItemInfo(e.item, e.cat);
        const mt = i > 0 ? 'margin-top:-5px;' : '';
        if (info.highlight) {
          // VRE / CRE / CPO: 두꺼운 테두리 + 강한 글로우 + 펄스 애니메이션
          const col = info.color;
          return `<div class="rm-icon rm-icon-hl"
            style="${mt}border:2px solid ${col};box-shadow:0 0 0 1px ${col}66, 0 0 10px ${col}99, 0 0 20px ${col}44;background:rgba(5,10,22,.95)">
            <span style="filter:drop-shadow(0 0 5px ${col})">${info.icon}</span>
          </div>`;
        }
        const glow = `0 0 8px ${info.color}88`;
        return `<div class="rm-icon"
          style="${mt}border-color:${info.color}55;box-shadow:${glow};background:rgba(5,10,22,.9)">
          <span style="filter:drop-shadow(0 0 4px ${info.color})">${info.icon}</span>
        </div>`;
      }).join('');

      div.innerHTML = `
        <div class="rm-stack">${stackItems}</div>
        <div class="rm-lbl">${num}</div>`;
    }

    div.addEventListener('mouseenter', e => showTip(e, num, uniq));
    div.addEventListener('mouseleave', hideTip);
    div.addEventListener('click', e => {
      e.stopPropagation();
      selRoom = num;
      render();
      // 사이드바 스크롤
      const ptEl = document.querySelector(`.pt-item[data-r="${num}"]`);
      if (ptEl) ptEl.scrollIntoView({behavior:'smooth', block:'nearest'});
    });
    overlay.appendChild(div);
  });
}

  const t = document.getElementById('tip');
  if (!entries.length) {
    hideTip(); return;

  // 환자별 그룹
  const byPid = {};
  entries.forEach(en => {
    if (!byPid[en.pid]) byPid[en.pid] = {name:en.name, sex_age:en.sex_age, items:[]};
    byPid[en.pid].items.push(en);
  });

  let html = `<div class="tp-room">${curWard} · ${num}호</div>`;
  Object.values(byPid).forEach(pt => {
    html += `<div style="border-top:1px solid var(--brd);padding-top:4px;margin-top:4px;">
      <div style="font-size:10px;color:var(--txt);margin-bottom:3px;">${pt.name} <span style="color:var(--dim);font-size:9px">${pt.sex_age}</span></div>`;
    pt.items.forEach(en => {
      const info = getItemInfo(en.item, en.cat);
      html += `<div class="tp-entry">
        <span class="tp-icon" style="filter:drop-shadow(0 0 3px ${info.color})">${info.icon}</span>
        <span class="tp-bug" style="color:${info.color}">${info.label}</span>
      </div>`;
    });
    html += '</div>';
  });

  t.innerHTML = html;
  t.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const t = document.getElementById('tip');
  const x = e.clientX + 16, y = e.clientY - 10;
  t.style.left = Math.min(x, window.innerWidth - 260) + 'px';
  t.style.top  = Math.max(y, 10) + 'px';
}
function hideTip() { document.getElementById('tip').style.display='none'; }
document.getElementById('fp-area').addEventListener('mousemove', moveTip);

// ══════════════════════════════════════════════
// 줌/패닝
// ══════════════════════════════════════════════
const fpa = document.getElementById('fp-area');
const fpc = document.getElementById('fp-cont');
let drag=false, dd={x:0,y:0}, dp={x:0,y:0};
function applyPan() { fpc.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${pan.scale})`; }
fpa.addEventListener('wheel', e => {
  e.preventDefault();
  pan.scale = Math.max(.35, Math.min(5, pan.scale+(e.deltaY<0?.15:-.15)));
  applyPan();
},{passive:false});
fpa.addEventListener('mousedown', e => {
  const t=e.target;
  if([fpa,fpc,document.getElementById('fp-img'),document.getElementById('fp-overlay')].includes(t))
    { drag=true; dd={x:e.clientX,y:e.clientY}; dp={x:pan.x,y:pan.y}; }
});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{if(drag){pan.x=dp.x+(e.clientX-dd.x);pan.y=dp.y+(e.clientY-dd.y);applyPan();}});
document.getElementById('zi').addEventListener('click',()=>{pan.scale=Math.min(5,pan.scale+.3);applyPan();});
document.getElementById('zo').addEventListener('click',()=>{pan.scale=Math.max(.35,pan.scale-.3);applyPan();});
document.getElementById('zr').addEventListener('click',()=>{pan={scale:1,x:0,y:0};applyPan();});

// ══════════════════════════════════════════════
// 통합 렌더
// ══════════════════════════════════════════════
function render() {
  updateDateNav();
  renderWardTabs();
  renderPtList();
  renderStatBar();
  renderFloorplan();
}

// ══════════════════════════════════════════════
// 날짜 네비게이션
// ══════════════════════════════════════════════
function updateDateNav() {
  document.getElementById('today-date').textContent = DATE_LIST[curDateIdx] + ' 기준';
  document.getElementById('date-prev').disabled = (curDateIdx === 0);
  document.getElementById('date-next').disabled = (curDateIdx === DATE_LIST.length - 1);
}
document.getElementById('date-prev').addEventListener('click', () => {
  if (curDateIdx > 0) {
    curDateIdx--; selRoom = null; pan = {scale:1,x:0,y:0}; applyPan(); render();
  }
});
document.getElementById('date-next').addEventListener('click', () => {
  if (curDateIdx < DATE_LIST.length - 1) {
    curDateIdx++; selRoom = null; pan = {scale:1,x:0,y:0}; applyPan(); render();
  }
});

render();
</script>
</body>
</html>
